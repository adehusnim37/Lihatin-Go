services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: lihatin-go:prod
    container_name: lihatin-api
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      APP_PORT: ${APP_PORT}
      ENV: ${ENV}
      GIN_MODE: ${GIN_MODE}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRED: ${JWT_EXPIRED:-24}
      REFRESH_TOKEN_EXPIRED: ${REFRESH_TOKEN_EXPIRED:-168}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-48}
      PREMIUM_CODE_SECRET: ${PREMIUM_CODE_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DOMAIN: ${DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME:-Lihatin}
      IP_GEOLOCATION_API_KEY: ${IP_GEOLOCATION_API_KEY:-}
      EXPIRE_EMAIL_VERIFICATION_TOKEN_HOURS: ${EXPIRE_EMAIL_VERIFICATION_TOKEN_HOURS:-24}
      CSRF_SECRET: ${CSRF_SECRET}
      RATE_LIMIT: ${RATE_LIMIT:-100}
      AUTH_ENFORCE_TOTP_FOR_PRIVILEGED: ${AUTH_ENFORCE_TOTP_FOR_PRIVILEGED:-true}
      AUTH_SECOND_FACTOR_LIMIT_PER_USER_IP: ${AUTH_SECOND_FACTOR_LIMIT_PER_USER_IP:-8}
      AUTH_SECOND_FACTOR_LIMIT_PER_IP: ${AUTH_SECOND_FACTOR_LIMIT_PER_IP:-60}
      AUTH_SECOND_FACTOR_WINDOW_MINUTES: ${AUTH_SECOND_FACTOR_WINDOW_MINUTES:-15}
      GOOGLE_OAUTH_AUTHORIZE_ENDPOINT: ${GOOGLE_OAUTH_AUTHORIZE_ENDPOINT}
      GOOGLE_OAUTH_TOKEN_ENDPOINT: ${GOOGLE_OAUTH_TOKEN_ENDPOINT}
      GOOGLE_OAUTH_TOKEN_INFO_ENDPOINT: ${GOOGLE_OAUTH_TOKEN_INFO_ENDPOINT}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-openid email profile}
      DISPOSABLE_EMAIL_BLOCK_LIST_URL: ${DISPOSABLE_EMAIL_BLOCK_LIST_URL:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      SUPPORT_ALERT_EMAILS: ${SUPPORT_ALERT_EMAILS:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_REGION: ${OSS_REGION:-auto}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-}
      OSS_BUCKET: ${OSS_BUCKET:-lihatin}
      OSS_PATH_STYLE: ${OSS_PATH_STYLE:-auto}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:8080:8080"
    networks:
      - backbone
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 700m
    cpus: 1.5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  backbone:
    external: true
    name: ${SHARED_NETWORK_NAME:-lihatin-backbone}
